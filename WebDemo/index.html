<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glance - Interactive Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <!-- Toolbar -->
        <header class="toolbar">
            <div class="toolbar-left">
                <h1 class="app-title">Glance Demo</h1>
            </div>
            <div class="toolbar-center">
                <label for="fileInput" class="file-input-label" title="Open Image File">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21l7.59-7.59L17 19V5h-7v7.59l9 9.17zM7 3c0-.55.45-1-1-1s1 .45 1 1v10c0 .55-.45 1-1h10c.55 0 1-.45 1-1V3c0-.55-.45-1-1-1z"/>
                    </svg>
                    Open File
                </label>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <button id="prevImage" class="toolbar-btn" title="Previous Image">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                    Previous
                </button>
                <button id="nextImage" class="toolbar-btn" title="Next Image">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                    Next
                </button>
                <button id="splitMode" class="toolbar-btn" title="Split Screen Mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 3h18v18H3V3zm16 16v-2H5v2h14zm-2-4H5v2h12V15zm-2-4H5v2h12V11zm-2-4H5v2h12V7z"/>
                    </svg>
                    Split
                </button>
                <button id="autoCrop" class="toolbar-btn" title="Auto Crop to Faces" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 14l5 5 5-5v4.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5V14zm7-7l-5-5-5 5v4.5C4 11.33 4.67 12 5.5 12S7 11.33 7 10.5V7z"/>
                    </svg>
                    Auto-crop
                </button>
            </div>
            <div class="toolbar-right">
                <div id="gpuIndicator" class="gpu-indicator">GPU: Software</div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Canvas Area -->
            <section class="canvas-section">
                <div class="canvas-container">
                    <canvas id="mainCanvas" width="800" height="600"></canvas>
                    <div id="splitOverlay" class="split-overlay" style="display: none;">
                        <canvas id="rightCanvas" width="400" height="600"></canvas>
                    </div>
                </div>
            </section>

            <!-- Side Panel -->
            <aside class="side-panel">
                <!-- Sliders -->
                <div class="controls-group">
                    <h3>Image Adjustments</h3>
                    
                    <div class="slider-control">
                        <label>
                            <span>Exposure</span>
                            <span id="exposureValue" class="value">0.0</span>
                        </label>
                        <input type="range" id="exposureSlider" min="-3" max="3" step="0.1" value="0">
                    </div>

                    <div class="slider-control">
                        <label>
                            <span>Contrast</span>
                            <span id="contrastValue" class="value">1.0</span>
                        </label>
                        <input type="range" id="contrastSlider" min="0.7" max="1.5" step="0.05" value="1">
                    </div>

                    <div class="slider-control">
                        <label>
                            <span>Gamma</span>
                            <span id="gammaValue" class="value">1.0</span>
                        </label>
                        <input type="range" id="gammaSlider" min="0.5" max="2.0" step="0.1" value="1">
                    </div>

                    <div class="slider-control">
                        <label>
                            <span>Saturation</span>
                            <span id="saturationValue" class="value">1.0</span>
                        </label>
                        <input type="range" id="saturationSlider" min="0" max="2.0" step="0.1" value="1">
                    </div>
                </div>

                <!-- Histogram -->
                <div class="controls-group">
                    <h3>Histogram</h3>
                    <div class="histogram-container">
                        <canvas id="histogramCanvas" width="250" height="150"></canvas>
                    </div>
                </div>

                <!-- Face Detection Panel -->
                <div class="controls-group">
                    <h3>Face Detection</h3>
                    <div class="face-detection-panel">
                        <div class="detection-status" id="detectionStatus">
                            <span class="status-indicator" id="statusIndicator"></span>
                            <span id="statusText">Ready to detect faces</span>
                        </div>
                        <div class="detection-results" id="detectionResults" style="display: none;">
                            <div class="faces-count">
                                <span id="facesCount">0</span> faces detected
                            </div>
                            <div class="faces-list" id="facesList">
                                <!-- Face details will be populated here -->
                            </div>
                        </div>
                        <div class="detection-controls">
                            <button id="detectFaces" class="btn-primary">Detect Faces</button>
                            <button id="clearDetection" class="btn-secondary">Clear</button>
                        </div>
                    </div>
                </div>

                <!-- Recent Files -->
                <div class="controls-group">
                    <h3>Recent Files</h3>
                    <div class="recent-files">
                        <div class="file-list" id="fileList">
                            <!-- Files will be populated by JS -->
                        </div>
                        <button id="openFile" class="btn-primary">Open</button>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div class="status-left">
                <span id="imageInfo">800×600 • RGB • 0 FPS</span>
                <span id="imageCounter" class="image-counter">1/10</span>
            </div>
            <div class="status-right">
                <span id="zoomLevel">Zoom: 100%</span>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/imageGenerator.js"></script>
    <script src="js/imageLoader.js"></script>
    <script src="js/simpleImageProvider.js"></script>
    <script src="js/imageProvider.js"></script>
    <script src="js/imageProcessor.js"></script>
    <script src="js/histogram.js"></script>
    <script src="js/faceDetector.js"></script>
    <script src="js/splitScreen.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
